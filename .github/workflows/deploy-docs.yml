name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - ".github/workflows/deploy-docs.yml"
  pull_request:
    paths:
      - "apps/docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun turbo build --filter=@metapowers/docs

      - name: Add .nojekyll
        run: touch apps/docs/out/.nojekyll

      - name: Add /docs redirect to /docs/overview
        run: |
          mkdir -p apps/docs/out/docs
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=overview/"></head></html>' > apps/docs/out/docs/index.html

      - name: Generate sitemap.xml
        run: |
          cd apps/docs/out
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          find . -name "index.html" | sed 's|^\./||;s|/index\.html$|/|;s|^index\.html$|/|' | sort | while read -r path; do
            echo "  <url><loc>https://bromso.github.io/metapowers${path}</loc></url>" >> sitemap.xml
          done
          echo '</urlset>' >> sitemap.xml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/out

  deploy:
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
