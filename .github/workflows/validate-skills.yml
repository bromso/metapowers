name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - "plugins/**"
      - "packages/skill-validator/**"
  pull_request:
    paths:
      - "plugins/**"
      - "packages/skill-validator/**"

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install

      - name: Build validator
        run: bun turbo build --filter=@metapowers/skill-validator

      - name: Validate all skills
        run: bun run lint:skills
